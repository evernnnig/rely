<nav class="fixed w-full z-50 bg-black/90 backdrop-blur-sm border-b border-gray-800">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-20">
      <div class="flex items-center">
        <button (click)="handleNavigation('home')">
          <img src="/photo_2026-03-24_07-09-28_(3).jpg" alt="RELY" class="h-8 w-auto" />
        </button>
      </div>

      <!-- Desktop menu -->
      <div class="hidden md:flex items-center space-x-8">
        <button
          (click)="handleNavigation('home', 'inicio')"
          [class]="currentView === 'home' ? 'text-orange-500' : 'text-gray-300 hover:text-white'"
          class="transition-colors">
          Inicio
        </button>
        <button
          (click)="handleNavigation('home', 'vehiculos')"
          class="text-gray-300 hover:text-white transition-colors">
          Vehículos
        </button>
        <button
          (click)="handleNavigation('home', 'caracteristicas')"
          class="text-gray-300 hover:text-white transition-colors">
          Características
        </button>

        <ng-container *ngIf="isAuthenticated">
          <button
            (click)="handleNavigation('sales')"
            [class]="currentView === 'sales' ? 'text-orange-500' : 'text-gray-300 hover:text-white'"
            class="transition-colors">
            Ventas
          </button>
          <button
            (click)="handleNavigation('orders')"
            [class]="currentView === 'orders' ? 'text-orange-500' : 'text-gray-300 hover:text-white'"
            class="transition-colors">
            Órdenes
          </button>
          <button
            (click)="handleNavigation('tracking')"
            [class]="currentView === 'tracking' ? 'text-orange-500' : 'text-gray-300 hover:text-white'"
            class="transition-colors">
            Tracking
          </button>
        </ng-container>

        <button
          (click)="handleNavigation('home', 'contacto')"
          class="bg-orange-600 text-white px-6 py-2 rounded-full hover:bg-orange-700 transition-colors">
          Contacto
        </button>

        <ng-container *ngIf="isAuthenticated; else loginBtn">
          <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 text-gray-300">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <span class="text-sm">{{ userEmail }}</span>
            </div>
            <button (click)="logout.emit()" class="flex items-center gap-2 text-gray-300 hover:text-white transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Salir
            </button>
          </div>
        </ng-container>
        <ng-template #loginBtn>
          <button (click)="login.emit()" class="flex items-center gap-2 text-gray-300 hover:text-white transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            Iniciar Sesión
          </button>
        </ng-template>
      </div>

      <!-- Mobile menu button -->
      <div class="md:hidden">
        <button (click)="toggleMenu()" class="text-gray-300 hover:text-white">
          <svg *ngIf="!isOpen" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          <svg *ngIf="isOpen" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile menu -->
  <div *ngIf="isOpen" class="md:hidden bg-black/95 border-t border-gray-800">
    <div class="px-4 pt-2 pb-4 space-y-3">
      <button (click)="handleNavigation('home', 'inicio')" class="block text-gray-300 hover:text-white py-2 w-full text-left">Inicio</button>
      <button (click)="handleNavigation('home', 'vehiculos')" class="block text-gray-300 hover:text-white py-2 w-full text-left">Vehículos</button>
      <button (click)="handleNavigation('home', 'caracteristicas')" class="block text-gray-300 hover:text-white py-2 w-full text-left">Características</button>

      <ng-container *ngIf="isAuthenticated">
        <button (click)="handleNavigation('sales')" class="block text-gray-300 hover:text-white py-2 w-full text-left">Ventas</button>
        <button (click)="handleNavigation('orders')" class="block text-gray-300 hover:text-white py-2 w-full text-left">Órdenes</button>
        <button (click)="handleNavigation('tracking')" class="block text-gray-300 hover:text-white py-2 w-full text-left">Tracking</button>
      </ng-container>

      <button (click)="handleNavigation('home', 'contacto')" class="block w-full bg-orange-600 text-white px-6 py-2 rounded-full hover:bg-orange-700 transition-colors mt-2">Contacto</button>

      <ng-container *ngIf="isAuthenticated; else mobileLoginBtn">
        <div class="pt-4 border-t border-gray-700 mt-4">
          <div class="flex items-center gap-2 text-gray-300 mb-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="text-sm">{{ userEmail }}</span>
          </div>
          <button (click)="logout.emit()" class="flex items-center gap-2 text-gray-300 hover:text-white transition-colors w-full">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Salir
          </button>
        </div>
      </ng-container>
      <ng-template #mobileLoginBtn>
        <button (click)="login.emit()" class="flex items-center gap-2 text-gray-300 hover:text-white transition-colors w-full pt-4 border-t border-gray-700 mt-4">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Iniciar Sesión
        </button>
      </ng-template>
    </div>
  </div>
</nav>
