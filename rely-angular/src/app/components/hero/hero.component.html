<section id="inicio" class="relative h-screen flex items-center justify-center overflow-hidden">
  <div class="absolute inset-0 z-0">
    <img
      src="/photo_2026-03-24_07-09-28_(2).jpg"
      alt="RELY Truck"
      class="w-full h-full object-cover"
    />
    <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-black/40 to-black"></div>
  </div>

  <div class="relative z-10 text-center px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto">
    <h1 class="text-5xl sm:text-6xl md:text-7xl lg:text-8xl font-bold text-white mb-6 tracking-tight">
      Poder sin límites
    </h1>
    <p class="text-xl sm:text-2xl md:text-3xl text-gray-200 mb-8 font-light">
      Descubre la nueva generación de camionetas RELY
    </p>
    <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
      <button
        (click)="isPurchaseOpen = true"
        class="bg-orange-600 text-white px-8 py-4 rounded-full text-lg font-medium hover:bg-orange-700 transition-all transform hover:scale-105">
        Comprar Ahora
      </button>
      <a href="#caracteristicas" class="bg-white/10 backdrop-blur-sm text-white px-8 py-4 rounded-full text-lg font-medium hover:bg-white/20 transition-all border border-white/30">
        Ver Especificaciones
      </a>
    </div>
  </div>

  <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2 z-10 animate-bounce">
    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
  </div>
</section>

<app-purchase [isOpen]="isPurchaseOpen" (closeModal)="isPurchaseOpen = false"></app-purchase>
