<div *ngIf="isOpen" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4 overflow-y-auto">
  <div class="bg-gray-950 rounded-2xl w-full max-w-md shadow-2xl border border-gray-800 my-8">
    <div class="flex justify-between items-center p-6 border-b border-gray-800">
      <h2 class="text-2xl font-bold text-white">Finalizar Compra</h2>
      <button (click)="closeModal.emit()" class="p-2 hover:bg-gray-800 rounded-lg transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="p-6">
      <!-- Success state -->
      <div *ngIf="isSubmitted; else formTpl" class="text-center py-8">
        <div class="flex justify-center mb-4">
          <div class="bg-green-500/20 p-4 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </div>
        <h3 class="text-xl font-bold text-white mb-2">¡Orden Guardada!</h3>
        <p class="text-gray-400 mb-4">La referencia {{ formData.reference_number }} ha sido registrada en el sistema.</p>
        <p class="text-orange-500 text-sm font-medium">Cerrando ventana...</p>
      </div>

      <!-- Form -->
      <ng-template #formTpl>
        <form (ngSubmit)="handleSubmit($event)" class="space-y-4">
          <!-- Vehicle summary -->
          <div class="bg-gray-900 p-4 rounded-lg border border-gray-800 mb-4">
            <div class="flex justify-between items-end">
              <div>
                <p class="text-gray-400 text-xs uppercase tracking-wider">Vehículo</p>
                <p class="text-xl font-bold text-white">{{ currentVehicle.model }} <span class="text-gray-500 text-sm">{{ currentVehicle.year }}</span></p>
              </div>
              <div class="text-right">
                <p class="text-gray-400 text-xs uppercase tracking-wider">Precio</p>
                <p class="text-2xl font-bold text-orange-500">${{ currentVehicle.price.toLocaleString() }}</p>
              </div>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1 uppercase">Nombres</label>
              <input type="text" [value]="formData.first_name" (input)="handleInputChange('first_name', $any($event.target).value)" required class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg text-white focus:border-orange-500 outline-none" />
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1 uppercase">Apellidos</label>
              <input type="text" [value]="formData.last_name" (input)="handleInputChange('last_name', $any($event.target).value)" required class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg text-white focus:border-orange-500 outline-none" />
            </div>
          </div>

          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1 uppercase">Email</label>
            <input type="email" [value]="formData.email" (input)="handleInputChange('email', $any($event.target).value)" required class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg text-white focus:border-orange-500 outline-none" />
          </div>

          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1 uppercase">Teléfono</label>
            <input type="tel" [value]="formData.phone" (input)="handleInputChange('phone', $any($event.target).value)" required class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg text-white focus:border-orange-500 outline-none" />
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1 uppercase">Ref. de Pago</label>
              <input type="text" [value]="formData.reference_number" (input)="handleInputChange('reference_number', $any($event.target).value)" required class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg text-white focus:border-orange-500 outline-none" />
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1 uppercase">Método</label>
              <select [value]="formData.paymentMethod" (change)="handleInputChange('paymentMethod', $any($event.target).value)" class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg text-white focus:border-orange-500 outline-none">
                <option value="Transferencia">Transferencia</option>
                <option value="Zelle">Zelle</option>
                <option value="Efectivo">Efectivo</option>
                <option value="Crypto">Crypto</option>
              </select>
            </div>
          </div>

          <div *ngIf="error" class="bg-red-500/10 border border-red-500/50 text-red-400 p-3 rounded-lg text-xs italic">
            &#9888;&#65039; {{ error }}
          </div>

          <div class="pt-4 space-y-3">
            <button type="submit" [disabled]="isLoading" class="w-full bg-orange-600 text-white py-3 rounded-lg font-bold hover:bg-orange-700 transition-all disabled:opacity-50 flex justify-center items-center gap-2">
              <ng-container *ngIf="isLoading; else submitText">
                <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>
                Procesando con el Servidor...
              </ng-container>
              <ng-template #submitText>Confirmar y Registrar Venta</ng-template>
            </button>
          </div>
        </form>
      </ng-template>
    </div>
  </div>
</div>
